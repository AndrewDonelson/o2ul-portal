name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, production]

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: false
      - name: Run gitleaks on current workspace
        run: |
          set -euo pipefail
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          "$(go env GOPATH)/bin/gitleaks" dir --no-banner --redact .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: go.sum
      - name: Go vet
        run: go vet ./...
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Staticcheck
        run: staticcheck ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  test:
    name: Go Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ci_db_${{ github.run_id }}
          POSTGRES_USER: ci_user_${{ github.run_id }}
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci_user_${{ github.run_id }} -d ci_db_${{ github.run_id }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      REDIS_ADDR: localhost:6379
      MASTER_ADMIN_USERNAME: ciadmin${{ github.run_id }}
      MASTER_ADMIN_EMAIL: ci+${{ github.run_id }}@example.invalid
      WEB_ENABLE_HTTP3: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache-dependency-path: go.sum
      - name: Run tests
        run: |
          set -euo pipefail
          export POSTGRES_DSN="postgres://ci_user_${GITHUB_RUN_ID}@localhost:5432/ci_db_${GITHUB_RUN_ID}?sslmode=disable"
          export JWT_SECRET="sha-${GITHUB_SHA}"
          export ORCHESTRATOR_CONTROL_TOKEN="run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          export MASTER_ADMIN_PASSWORD="pw-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          make test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build frontend
        run: make frontend-build

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: [lint, security, test, frontend-build]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Generate Go SBOM (CycloneDX)
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0
          "$(go env GOPATH)/bin/cyclonedx-gomod" app -json -output sbom-go.cdx.json ./...
      - name: Generate Web SBOM (SPDX)
        working-directory: web
        run: npm sbom --sbom-format spdx > ../sbom-web.spdx.json
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-artifacts
          path: |
            sbom-go.cdx.json
            sbom-web.spdx.json
